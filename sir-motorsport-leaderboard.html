<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIR Motorsport Leaderboard</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
  margin: 0;
}

h1 {
  padding: 10px;
}

.container {
  padding: 10px;
}

input {
  width: 90%;
  padding: 14px;
  margin: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 14px;
  margin: 6px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  background: #e10600;
  color: white;
  width: 90%;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
}

th {
  background: #1a1a1a;
}

.top {
  background: #111;
  font-size: 18px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🏁 SIR Motorsport</h1>

<div class="container" id="entryMode">

  <input id="name" placeholder="Driver Name">
  <input id="email" placeholder="Email">
  <input id="lap" placeholder="Lap Time (seconds)">

  <button onclick="addEntry()">Add Lap</button>
  <button onclick="toggleDisplay()">Display Leaderboard</button>
  <button onclick="exportCSV()">Export Data</button>
  <button onclick="clearData()">Reset Event</button>

</div>

<div class="container hidden" id="displayMode">
  <h2>LIVE LEADERBOARD</h2>
  <button onclick="toggleDisplay()">Back</button>
</div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Lap</th>
    </tr>
  </thead>
  <tbody id="board"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("sir_laps")) || [];

function addEntry() {
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let lap = parseFloat(document.getElementById("lap").value);

  if (!name || !email || isNaN(lap)) {
    alert("Enter valid details");
    return;
  }

  data.push({ name, email, lap });
  data.sort((a, b) => a.lap - b.lap);

  localStorage.setItem("sir_laps", JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("lap").value = "";

  render();
}

function render() {
  let board = document.getElementById("board");
  board.innerHTML = "";

  data.forEach((d, i) => {
    let medal = "";
    if (i === 0) medal = "🥇";
    if (i === 1) medal = "🥈";
    if (i === 2) medal = "🥉";

    board.innerHTML += `
      <tr class="top">
        <td>${medal} ${i + 1}</td>
        <td>${d.name}</td>
        <td>${d.lap.toFixed(2)}</td>
      </tr>
    `;
  });
}

function toggleDisplay() {
  document.getElementById("entryMode").classList.toggle("hidden");
  document.getElementById("displayMode").classList.toggle("hidden");
}

function exportCSV() {
  let csv = "Name,Email,Lap Time\n";
  data.forEach(d => {
    csv += `${d.name},${d.email},${d.lap}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "sir-motorsport-data.csv";
  a.click();
}

function clearData() {
  if (confirm("Reset all data?")) {
    data = [];
    localStorage.removeItem("sir_laps");
    render();
  }
}

render();

</script>

</body>
</html>
